<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="currentColor" stroke-width="1.5"/>
  
  <!-- Inner circle -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="currentColor" stroke-width="1"/>

  <!-- Lotus petals (16 outer) -->
  <g stroke="currentColor" stroke-width="0.8" fill="none">
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(0 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(22.5 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(45 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(67.5 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(90 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(112.5 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(135 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(157.5 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(202.5 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(225 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(247.5 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(270 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(292.5 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(315 100 100)"/>
    <ellipse cx="100" cy="24" rx="5" ry="12" transform="rotate(337.5 100 100)"/>
  </g>

  <!-- 8 petal lotus inner -->
  <g stroke="currentColor" stroke-width="0.8" fill="none">
    <ellipse cx="100" cy="38" rx="5" ry="12" transform="rotate(0 100 100)"/>
    <ellipse cx="100" cy="38" rx="5" ry="12" transform="rotate(45 100 100)"/>
    <ellipse cx="100" cy="38" rx="5" ry="12" transform="rotate(90 100 100)"/>
    <ellipse cx="100" cy="38" rx="5" ry="12" transform="rotate(135 100 100)"/>
    <ellipse cx="100" cy="38" rx="5" ry="12" transform="rotate(180 100 100)"/>
    <ellipse cx="100" cy="38" rx="5" ry="12" transform="rotate(225 100 100)"/>
    <ellipse cx="100" cy="38" rx="5" ry="12" transform="rotate(270 100 100)"/>
    <ellipse cx="100" cy="38" rx="5" ry="12" transform="rotate(315 100 100)"/>
  </g>

  <!-- Upward triangles (4) -->
  <g stroke="currentColor" stroke-width="1.2" fill="none">
    <!-- Large upward -->
    <polygon points="100,30 160,130 40,130"/>
    <!-- Medium upward -->
    <polygon points="100,45 148,118 52,118"/>
    <!-- Small upward -->
    <polygon points="100,58 138,108 62,108"/>
    <!-- Tiny upward -->
    <polygon points="100,68 128,100 72,100"/>
  </g>

  <!-- Downward triangles (5) -->
  <g stroke="currentColor" stroke-width="1.2" fill="none">
    <!-- Large downward -->
    <polygon points="100,170 160,70 40,70"/>
    <!-- Medium downward -->
    <polygon points="100,158 148,82 52,82"/>
    <!-- Small downward -->
    <polygon points="100,148 138,90 62,90"/>
    <!-- Tiny downward -->
    <polygon points="100,136 126,98 74,98"/>
    <!-- Smallest downward -->
    <polygon points="100,125 118,105 82,105"/>
  </g>

  <!-- Central bindu dot -->
  <circle cx="100" cy="100" r="3" fill="currentColor"/>

  <!-- Outer square with gates (bhupura) -->
  <rect x="8" y="8" width="184" height="184" fill="none" stroke="currentColor" stroke-width="1"/>
  <rect x="14" y="14" width="172" height="172" fill="none" stroke="currentColor" stroke-width="0.8"/>
</svg>
